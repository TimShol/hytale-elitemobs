                def weaponEndDist = weaponHitboxParams[weapon]?.endDistance ?: 2.5
                // MaxRange should be close to EndDistance so the NPC starts attacking
                // when it can actually hit. Slightly less than EndDistance because
                // UseProjectedDistance uses edge-to-edge distance (shorter than center-to-center).
                def weaponMaxRange = Math.max(2.5, weaponEndDist - 0.2)

                def defaultBasicAttacks = [Attacks: ["Root_RPGMobs_Attack_${weapon}"], Randomise: true,
