        factionCaeParams.each { faction, params ->
            def caeActions = [:]
            caeActions.SelectTarget = [Type: 'SelectBasicAttackTarget', Description: 'Select attack target',
                Conditions: [[Type: 'Randomiser', MinValue: 0.9, MaxValue: 1.0]]]

            // ShieldBlock: reactive guard on hit, sustained hold on continuous damage.
            // ChargeFor = how long the block holds. After it expires, TimeSinceLastUsed
            // cooldown prevents re-blocking (simulates shield break recovery).
            // WeightCoefficient 2.5 = high priority when taking damage.
            caeActions.ShieldBlock = [Type: 'Ability', Description: 'Reactive shield block on damage',
                Target: 'Hostile', AbilityType: 'Secondary', OffhandSlot: 0,
                Ability: 'Root_RPGMobs_Guard_Shield_Sustained', SubState: 'Default',
