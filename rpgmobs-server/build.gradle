                retreatHealthThreshold: 0.20, retreatDistance: [12, 18], retreatSwitchPoint: 10,
                reengageXRange: [0, 5], reengageRandomiser: [0.5, 0.7]]
        ]

        def perTierCaeCount = 0
        tierCaeParams.each { int tier, Map tp ->
            weaponNames.each { weapon ->
                def caeActions = [:]
                caeActions.SelectTarget = [Type: 'SelectBasicAttackTarget', Description: 'Select attack target',
                    Conditions: [[Type: 'Randomiser', MinValue: 0.9, MaxValue: 1.0]]]

                // Guard: Uses custom Root_RPGMobs_Guard_Shield (no Replace/Var issues).
                // ChargeFor controls guard duration depending on tier.
                if (tp.hasShield) {
                    caeActions.ShieldBlock = [Type: 'Ability', Description: 'Shield block on sustained damage',
                        Target: 'Hostile', AbilityType: 'Secondary', OffhandSlot: 0,
                        Ability: 'Root_RPGMobs_Guard_Shield_Sustained', SubState: 'Default',
                        AttackDistanceRange: [0.5, 10], PostExecuteDistanceRange: [1.5, 2],
                        ChargeFor: tp.shieldChargeFor, WeightCoefficient: 1.25,
                        Conditions: [
                            [Type: 'Randomiser', MinValue: 0.4, MaxValue: 1],
                            [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: tp.shieldSwitchPoint]],
                            [Type: 'RecentSustainedDamage', Curve: [ResponseCurve: 'InverseExponential', XRange: [0, 3]]]
                        ]]
                }

                if (tp.hasBackOff) {
                    // Matched to Praetorian's proven BackOff conditions:
                    // RecentSustainedDamage XRange [0, 3] = same sensitivity
                    // Randomiser [0.6, 1.0] = same as Praetorian
                    // WeightCoefficient 1.25 = same as Praetorian
                    caeActions.BackOff = [Type: 'State', Description: 'Back off after sustained damage',
                        State: 'Combat', SubState: 'Strafe',
                        PostExecuteDistanceRange: tp.backOffDistance,
                        Target: 'Hostile', WeightCoefficient: 1.25,
                        Conditions: [
                            [Type: 'RecentSustainedDamage', Curve: [ResponseCurve: 'InverseExponential', XRange: [0, 3]]],
                            [Type: 'Randomiser', MinValue: 0.6, MaxValue: 1.0],
                            [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: tp.backOffSwitchPoint]]
                        ]]
                }

                if (tp.hasRetreat) {
                    caeActions.HealthRetreat = [Type: 'State', Description: 'Retreat when health is low',
                        State: 'Combat', SubState: 'Strafe',
                        PostExecuteDistanceRange: tp.retreatDistance,
                        Target: 'Hostile', WeightCoefficient: 5.0,
                        Conditions: [
                            [Type: 'OwnStatPercent', Stat: 'Health', Curve: 'ReverseLinear'],
                            [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: tp.retreatSwitchPoint]]
                        ]]
                }

                if (tp.hasBackOff || tp.hasRetreat) {
                    caeActions.ReEngageFromStrafe = [Type: 'State', Description: 'Return to combat from strafe',
