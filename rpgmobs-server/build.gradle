plugins {
    id 'java'
    id 'com.gradleup.shadow' version '9.3.0'
}

def mod_build = 2

group = rootProject.property('group')
version = rootProject.ext.computeVersion(mod_build)
base.archivesName = rootProject.property('name').toString()

def generatedDir = file("${projectDir}/src/generated/java")

sourceSets {
    main {
        java.srcDirs += generatedDir
        resources.srcDirs += file("${projectDir}/src/generated/resources")
    }
}

tasks.register('generateAssetIds') {
    group = 'build'
    description = 'Scans Hytale asset folders to generate NPC and Item ID lists'

    def assetsDir = rootProject.file(rootProject.findProperty('hytale_assets_dir') ?: '../Hytale Assets (build-10)')
    def npcRolesDir = new File(assetsDir, 'Server/NPC/Roles')
    def itemsDir = new File(assetsDir, 'Common/Icons/ItemsGenerated')
    def outputFile = new File(generatedDir, 'com/frotty27/rpgmobs/generated/HytaleAssetIds.java')

    outputs.file(outputFile)
    outputs.upToDateWhen { false }

    doLast {
        def npcIds = [] as Set
        def npcExcludePatterns = [~/^Component_.*/, ~/^Template_.*/, ~/^Test_.*/, ~/^Static\d*$/]
        if (npcRolesDir.exists()) {
            npcRolesDir.eachFileRecurse(groovy.io.FileType.FILES) { file ->
                if (file.name.endsWith('.json')) {
                    def id = file.name.replaceAll(/\.json$/, '')
                    if (!npcExcludePatterns.any { id ==~ it }) {
                        npcIds.add(id)
                    }
                }
            }
        }
        def npcIdsSorted = npcIds.toList()
        npcIdsSorted.sort(String.CASE_INSENSITIVE_ORDER)

        def itemIds = []
        if (itemsDir.exists()) {
            itemsDir.eachFileMatch(~/.*\.png/) { file ->
                itemIds.add(file.name.replaceAll(/\.png$/, ''))
            }
        }
        itemIds.sort(String.CASE_INSENSITIVE_ORDER)

        def npcRolePaths = [:]
        if (npcRolesDir.exists()) {
            def rolesRoot = npcRolesDir.toPath()
            npcRolesDir.eachFileRecurse(groovy.io.FileType.FILES) { file ->
                if (file.name.endsWith('.json')) {
                    def id = file.name.replaceAll(/\.json$/, '')
                    if (!npcExcludePatterns.any { id ==~ it }) {
                        def relativePath = rolesRoot.relativize(file.toPath()).toString().replace('\\', '/')
                        npcRolePaths[id] = relativePath
                    }
                }
            }
        }

        outputFile.parentFile.mkdirs()
        def npcLiterals = npcIdsSorted.collect { '        "' + it + '"' }.join(',\n')
        def itemLiterals = itemIds.collect { '        "' + it + '"' }.join(',\n')
        def generatedResDir = new File(projectDir, 'src/generated/resources')
        def genRolesDir = new File(generatedResDir, 'Server/NPC/Roles')
        if (genRolesDir.exists()) genRolesDir.deleteDir()
        def genBalancingDir = new File(generatedResDir, 'Server/NPC/Balancing')
        if (genBalancingDir.exists()) genBalancingDir.deleteDir()
        def genInteractionsDir = new File(generatedResDir, 'Server/Item/Interactions/NPCs/RPGMobs/BasicAttacks')
        if (genInteractionsDir.exists()) genInteractionsDir.deleteDir()
        def genRootInteractionsDir = new File(generatedResDir, 'Server/Item/RootInteractions/NPCs/RPGMobs/BasicAttacks')
        if (genRootInteractionsDir.exists()) genRootInteractionsDir.deleteDir()

        def conditionalParams = [
            CombatBackwardsRelativeSpeed: 1.0,
            CombatStrafeWeight: 15.0,
            KnockbackScale: 0.4,
            LeashDistance: 40.0,
            CombatBackOffAfterAttack: true,
            BlockProbability: 20.0
        ]

        // Per-weapon hitbox parameters: EndDistance = how far the damage arc reaches.
        // Vanilla Skeleton_Knight reference: EndDistance 2.5, Length 60, RollOffset 30, YawStartOffset -30
        // Daggers short range but wide fast arc, Spears long range but narrow thrust.
        // MaxSpeed per weapon: affects how fast the NPC moves in combat (daggers = agile, battleaxes = heavy)
        // windUp = time before damage Selector fires. Must be long enough for parry
        // to cancel the attack before damage. If parry triggers during windUp, the Next
        // (damage Selector) never fires. Minimum ~0.15s for parry to react.
        def weaponHitboxParams = [
            Daggers:    [endDistance: 2.2, coneLength: 55, coneYaw: 30, windUp: 0.15, recovery: 0.12, combatSpeed: 9],
            Swords:     [endDistance: 2.8, coneLength: 60, coneYaw: 30, windUp: 0.20, recovery: 0.17, combatSpeed: 8],
            Longswords: [endDistance: 3.0, coneLength: 65, coneYaw: 30, windUp: 0.25, recovery: 0.20, combatSpeed: 8],
            Axes:       [endDistance: 2.8, coneLength: 55, coneYaw: 25, windUp: 0.20, recovery: 0.17, combatSpeed: 8],
            Battleaxes: [endDistance: 2.8, coneLength: 70, coneYaw: 35, windUp: 0.35, recovery: 0.30, combatSpeed: 7],
            Maces:      [endDistance: 2.8, coneLength: 60, coneYaw: 30, windUp: 0.50, recovery: 0.25, combatSpeed: 7],
            Clubs:      [endDistance: 2.8, coneLength: 55, coneYaw: 25, windUp: 0.22, recovery: 0.17, combatSpeed: 8],
            ClubsFlail: [endDistance: 2.8, coneLength: 60, coneYaw: 30, windUp: 0.25, recovery: 0.20, combatSpeed: 7],
            Spears:     [endDistance: 3.0, coneLength: 70, coneYaw: 15, windUp: 0.25, recovery: 0.20, combatSpeed: 8]
        ]

        // Player weapon animation set names - always use these so the animation
        // matches the HELD WEAPON regardless of NPC race. These are the same animation
        // sets players use from Server/Item/Animations/*.json.
        def weaponAnimationIds = [
            Daggers: 'Daggers', Swords: 'Sword', Longswords: 'Longsword', Axes: 'Axe',
            Battleaxes: 'Battleaxe', Maces: 'Mace', Clubs: 'Club', ClubsFlail: 'Club_Flail', Spears: 'Spear'
        ]

        // Per-weapon trail and sound IDs (verified Hytale asset IDs)
        def weaponTrails = [
            Swords: 'Medium_Default', Longswords: 'Sword_Distortion', Daggers: 'Daggers_Dash',
            Battleaxes: 'Large_Charged_Red', Axes: 'Medium_Default', Maces: 'Medium_Mace_Charged',
            Clubs: 'Large_Charged', ClubsFlail: 'Large_Charged', Spears: 'Medium_Default'
        ]
        // T1 sounds for basic attacks (lighter, standard swings)
        // T2 sounds are reserved for MultiSlash special abilities (heavier, more impactful)
        def weaponSounds = [
            Swords: 'SFX_Sword_T1_Swing', Longswords: 'SFX_Sword_T1_Swing',
            Daggers: 'SFX_Daggers_T1_Swing', Battleaxes: 'SFX_Battleaxe_T1_Swing',
            Axes: 'SFX_Axe_Iron_Swing', Maces: 'SFX_Mace_T1_Swing',
            Clubs: 'SFX_Mace_T1_Swing', ClubsFlail: 'SFX_Flail_Swing', Spears: 'SFX_Spear_Lunge'
        ]

        // Per-weapon impact sounds (played when hit lands on target)
        def weaponImpactSounds = [
            Swords: 'SFX_Sword_T2_Impact', Longswords: 'SFX_Longsword_Steel_Impact',
            Daggers: 'SFX_Daggers_T2_Slash_Impact', Battleaxes: 'SFX_Battleaxe_T2_Impact',
            Axes: 'SFX_Axe_Iron_Impact', Maces: 'SFX_Mace_T2_Impact',
            Clubs: 'SFX_T1_Impact_Blunt', ClubsFlail: 'SFX_T1_Impact_Blunt',
            Spears: 'SFX_Spear_Impact'
        ]

        // Per-weapon impact particles (played on hit target)
        def weaponImpactParticles = [
            Swords: 'Impact_Sword_Basic', Longswords: 'Impact_Sword_Basic',
            Daggers: 'Impact_Dagger_Slash', Battleaxes: 'Impact_Battleaxe_Bash',
            Axes: 'Impact_Sword_Basic', Maces: 'Impact_Mace_Basic',
            Clubs: 'Impact_Mace_Basic', ClubsFlail: 'Impact_Mace_Basic',
            Spears: 'Impact_Sword_Basic'
        ]

        // Per-weapon attack chains (unique swing directions per weapon)
        // Using only SwingLeft, SwingRight, SwingDownLeft, SwingDownRight where available
        // Other directions reserved for Multi Slash abilities
        def weaponAttackChains = [
            Swords:     ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight'],
            Longswords: ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight'],
            Axes:       ['SwingLeft', 'SwingRight', 'SwingDownLeft', 'SwingRight', 'SwingLeft'],
            Battleaxes: ['SwingLeft', 'SwingRight', 'SwingDownLeft', 'SwingDownRight', 'SwingLeft'],
            Maces:      ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight'],
            Clubs:      ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight'],
            ClubsFlail: ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight'],
            Daggers:    ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight'],
            Spears:     ['SwingLeft', 'SwingRight', 'SwingLeft', 'SwingRight']
        ]

        def weaponNames = ['Daggers', 'Swords', 'Longswords', 'Axes', 'Battleaxes', 'Maces', 'Clubs', 'ClubsFlail', 'Spears']

        // Generate per-weapon attack interactions
        def attackFileCount = 0
        genInteractionsDir.mkdirs()
        genRootInteractionsDir.mkdirs()

        // Selector direction mapping:
        // SwingLeft, SwingDownLeft -> Direction: ToLeft
        // SwingRight, SwingDownRight -> Direction: ToRight
        // YawStartOffset is ALWAYS negative (vanilla pattern: -30 for all swings)
        def generateSwingInteraction = { String weapon, String swingDirection, Map hitbox, String animationId, String trailId, String soundId, String impactSound ->
            Boolean isLeft = swingDirection == 'SwingLeft' || swingDirection == 'SwingDownLeft'
            String selectorDirection = isLeft ? 'ToLeft' : 'ToRight'
            Integer yawOffset = -(hitbox.coneYaw as Integer)
            return [
                Type: 'Simple',
                Effects: [ItemPlayerAnimationsId: animationId, ItemAnimationId: swingDirection],
                RunTime: hitbox.windUp,
                Next: [
                    Type: 'Parallel',
                    Interactions: [
                        [
                            Interactions: [[
                                Type: 'Selector', RunTime: 0.10,
                                Selector: [
                                    Id: 'Horizontal', Direction: selectorDirection,
                                    TestLineOfSight: true, ExtendTop: 0.5, ExtendBottom: 0.5,
                                    StartDistance: 0.5, EndDistance: hitbox.endDistance,
                                    Length: hitbox.coneLength, RollOffset: 30,
                                    YawStartOffset: yawOffset
                                ],
                                HitEntity: [Interactions: ["RPGMobs_Damage_${weapon}"]],
                                Next: [Type: 'Simple', RunTime: hitbox.recovery]
                            ]]
                        ],
                        [
                            Interactions: [[
                                Type: 'Simple', RunTime: hitbox.recovery,
                                Effects: [
                                    Trails: [[
                                        PositionOffset: [X: 0.8, Y: 0, Z: 0],
                                        RotationOffset: [Pitch: 0, Roll: 90, Yaw: 0],
                                        TargetNodeName: 'Handle',
                                        TrailId: trailId
                                    ]],
                                    WorldSoundEventId: soundId
                                ]
                            ]]
                        ]
                    ]
                ]
            ]
        }

        // Generate per-weapon attack files with full Parallel structure (hitbox + trail + sound)
        // Animation IDs use player weapon sets so animations match the HELD weapon
        weaponNames.each { String weapon ->
            def hitbox = weaponHitboxParams[weapon]
            String animId = weaponAnimationIds[weapon] ?: 'Default'
            String trailId = weaponTrails[weapon] ?: 'Medium_Default'
            String soundId = weaponSounds[weapon] ?: 'SFX_Sword_T1_Swing'
            String impactSoundId = weaponImpactSounds[weapon] ?: 'SFX_Sword_T2_Impact'
            def chain = weaponAttackChains[weapon]

            // Generate per-weapon damage interaction (with weapon-specific impact sound + particle)
            String impactParticle = weaponImpactParticles[weapon] ?: 'Impact_Sword_Basic'
            def damageInteraction = [
                Parent: 'DamageEntityParent',
                DamageCalculator: [BaseDamage: [Physical: 5]],
                DamageEffects: [
                    Knockback: [Force: 1, RelativeX: 0, RelativeZ: -1, VelocityY: 3, VelocityType: 'Set'],
                    WorldSoundEventId: impactSoundId,
                    LocalSoundEventId: impactSoundId,
                    WorldParticles: [[SystemId: impactParticle]]
                ]
            ]
            new File(genInteractionsDir, "RPGMobs_Damage_${weapon}.json").text =
                new groovy.json.JsonBuilder(damageInteraction).toPrettyString()
            attackFileCount++

            // Collect unique swing directions needed for this weapon
            def uniqueSwings = chain.toUnique() as List<String>

            // Generate one interaction file per unique swing direction
            uniqueSwings.each { String swingDir ->
                def interaction = generateSwingInteraction(weapon, swingDir, hitbox, animId, trailId, soundId, impactSoundId)
                new File(genInteractionsDir, "RPGMobs_Attack_${weapon}_${swingDir}.json").text =
                    new groovy.json.JsonBuilder(interaction).toPrettyString()
                attackFileCount++
            }

            // Generate root interaction with the weapon's full attack chain
            def chainInteractionIds = chain.collect { String swingDir -> "RPGMobs_Attack_${weapon}_${swingDir}" as String }
            def root = [
                Interactions: [[
                    Type: 'Chaining', ChainId: "RPGMobs_Combo_${weapon}",
                    ChainingAllowance: 15,
                    Next: chainInteractionIds
                ]],
                Tags: [Attack: ['Melee']]
            ]
            new File(genRootInteractionsDir, "Root_RPGMobs_Attack_${weapon}.json").text =
                new groovy.json.JsonBuilder(root).toPrettyString()
            attackFileCount++
        }

        // Generic fallback (Default animation, EndDistance 2.5) for NPCs with unknown faction/weapon
        def defaultHitbox = weaponHitboxParams['Swords']
        // Generic damage interaction (fallback - uses generic melee impact, not sword-specific)
        def genericDamage = [
            Parent: 'DamageEntityParent',
            DamageCalculator: [BaseDamage: [Physical: 5]],
            DamageEffects: [
                Knockback: [Force: 1, RelativeX: 0, RelativeZ: -1, VelocityY: 3, VelocityType: 'Set'],
                WorldSoundEventId: 'SFX_Light_Melee_T1_Impact',
                LocalSoundEventId: 'SFX_Light_Melee_T1_Impact',
                WorldParticles: [[SystemId: 'Impact_Mace_Basic']]
            ]
        ]
        new File(genInteractionsDir, 'RPGMobs_Damage_Generic.json').text =
            new groovy.json.JsonBuilder(genericDamage).toPrettyString()
        attackFileCount++

        def genericSwingLeft = generateSwingInteraction('Generic', 'SwingLeft', defaultHitbox, 'Default', 'Medium_Default', 'SFX_Sword_T1_Swing', 'SFX_Sword_T2_Impact')
        new File(genInteractionsDir, 'RPGMobs_Attack_SwingLeft.json').text =
            new groovy.json.JsonBuilder(genericSwingLeft).toPrettyString()
        attackFileCount++

        def genericSwingRight = generateSwingInteraction('Generic', 'SwingRight', defaultHitbox, 'Default', 'Medium_Default', 'SFX_Sword_T1_Swing', 'SFX_Sword_T2_Impact')
        new File(genInteractionsDir, 'RPGMobs_Attack_SwingRight.json').text =
            new groovy.json.JsonBuilder(genericSwingRight).toPrettyString()
        attackFileCount++

        def genericRoot = [
            Interactions: [[
                Type: 'Chaining', ChainId: 'RPGMobs_MeleeCombo',
                ChainingAllowance: 15,
                Next: ['RPGMobs_Attack_SwingLeft', 'RPGMobs_Attack_SwingRight',
                       'RPGMobs_Attack_SwingLeft', 'RPGMobs_Attack_SwingRight']
            ]],
            Tags: [Attack: ['Melee']]
        ]
        new File(genRootInteractionsDir, 'Root_RPGMobs_Attack_Melee.json').text =
            new groovy.json.JsonBuilder(genericRoot).toPrettyString()
        attackFileCount++

        println "Generated ${attackFileCount} per-weapon attack files (${weaponNames.size()} weapons + generic fallback)"

        // Phase 1: Scan all role files to build combat capability map and store parsed JSON
        def combatCapableTemplates = new HashSet<String>()
        def allRoleRefs = [:]
        def allRoleJsons = [:]
        npcRolesDir.eachFileRecurse(groovy.io.FileType.FILES) { file ->
            if (file.name.endsWith('.json')) {
                try {
                    def j = new groovy.json.JsonSlurper().parse(file)
                    def id = file.name.replaceAll(/\.json$/, '')
                    allRoleJsons[id] = j
                    if (j?.Reference) allRoleRefs[id] = j.Reference as String
                    if (j?.Parameters instanceof Map && j.Parameters.containsKey('CombatBackwardsRelativeSpeed')) {
                        combatCapableTemplates.add(id)
                    }
                    if (j?.Type == 'Abstract') {
                        def text = file.text
                        if (text.contains('Template_Intelligent') || text.contains('CombatBackwardsRelativeSpeed')) {
                            combatCapableTemplates.add(id)
                        }
                    }
                } catch (Exception ignored) {}
            }
        }
        boolean changed = true
        while (changed) {
            changed = false
            allRoleRefs.each { id, ref ->
                if (!combatCapableTemplates.contains(id) && combatCapableTemplates.contains(ref)) {
                    combatCapableTemplates.add(id)
                    changed = true
                }
            }
        }
        println "Found ${combatCapableTemplates.size()} combat-capable templates"

        // Phase 2: Resolve each NPC's Attack field by walking the reference chain
        def resolveAttackField
        resolveAttackField = { String npcId ->
            def json = allRoleJsons[npcId]
            if (!json) return 'Root_NPC_Attack_Melee'
            def attack = json?.Modify?.Attack
            if (attack instanceof String) return attack
            if (attack instanceof Map && attack?.Compute == 'Attack') {
                def paramValue = json?.Parameters?.Attack?.Value
                if (paramValue) return paramValue as String
            }
            def ref = allRoleRefs[npcId]
            if (ref && allRoleJsons.containsKey(ref)) {
                return resolveAttackField(ref)
            }
            return 'Root_NPC_Attack_Melee'
        }

        // Detect ranged NPCs by their attack interaction name
        def rangedKeywords = ['Bow', 'Shoot', 'Blast', 'Orb', 'Throw', 'Gun', 'Projectile', 'Wand', 'Ranged']
        def isRangedAttack = { String attackId ->
            def lowerAttack = attackId.toLowerCase()
            return rangedKeywords.any { lowerAttack.contains(it.toLowerCase()) }
        }

        // Detect faction from NPC ID for per-faction CAE assignment
        def detectFaction = { String npcId ->
            def lowerNpc = npcId.toLowerCase()
            if (lowerNpc.contains('trork')) return 'Trork'
            if (lowerNpc.contains('outlander')) return 'Outlander'
            if (lowerNpc.contains('goblin')) return 'Goblin'
            if (lowerNpc.contains('skeleton') || lowerNpc.contains('risen') || lowerNpc.contains('wraith')) return 'Skeleton'
            if (lowerNpc.contains('feran') || lowerNpc.contains('kweebec')) return 'Skeleton'
            return 'Skeleton'
        }

        // NPCs that should be fully excluded from CAE (non-humanoid fighters)
        def shouldExcludeFromCae = { String npcId ->
            def lower = npcId.toLowerCase()
            return lower.contains('golem') || lower.contains('firesteel') ||
                   lower.contains('scarak') || lower.contains('cactee')
        }

        // Phase 3: Generate role overrides with per-NPC CAE references
        def roleOverrideCount = 0
        def skippedCount = 0
        def preservedVanillaCaeCount = 0
        def rangedAttackToNpcIds = [:].withDefault { [] }
        def meleeFactionNpcIds = [:].withDefault { [] }

        // Factions that should get CAE by having their template changed to Template_Intelligent.
        // These NPCs use Abstract templates that don't have the CAE conditional branch.
        def caeConvertTemplates = [
            'Template_Trork_Melee', 'Template_Trork_Hybrid', 'Template_Trork_Ranger',
            'Template_Trork_Mage', 'Template_Trork_Companion', 'Template_Trork_Chieftain',
            'Template_Goblin_Scrapper', 'Template_Goblin_Scavenger',
            'Template_Goblin_Lobber', 'Template_Goblin_Ogre', 'Template_Goblin_Thief',
            'Template_Goblin_Miner', 'Template_Goblin_Ogre_Tutorial'
        ] as Set

        // Walk reference chain to find the root template for an NPC
        def findRootTemplate
        findRootTemplate = { String npcId ->
            def ref = allRoleRefs[npcId]
            if (ref && allRoleJsons.containsKey(ref)) {
                return findRootTemplate(ref)
            }
            return npcId
        }

        npcIdsSorted.findAll { npcRolePaths.containsKey(it) }.each { npcId ->
            def roleFile = new File(npcRolesDir, npcRolePaths[npcId])
            if (roleFile.exists()) {
                try {
                    def json = new groovy.json.JsonSlurper().parse(roleFile)
                    def ref = json?.Reference as String
                    def modify = json?.Modify
                    boolean hasAnyCombatParam = modify instanceof Map && (
                        modify.containsKey('CombatStrafeWeight') ||
                        modify.containsKey('CombatBackwardsRelativeSpeed') ||
                        modify.containsKey('CombatBackOffAfterAttack') ||
                        modify.containsKey('AttackDistance') ||
                        modify.containsKey('CombatBehaviorDistance') ||
                        modify.containsKey('DesiredAttackDistanceRange') ||
                        modify.containsKey('Attack')
                    )
                    boolean isCombatCapable = ref && combatCapableTemplates.contains(ref)
                    boolean isCaeExcluded = shouldExcludeFromCae(npcId)
                    boolean needsTemplateConversion = !isCaeExcluded && ref && caeConvertTemplates.contains(ref)
                    // Skip Wander/Patrol variants - they inherit combat params from the base
                    // role. Adding params directly to these variants causes validation errors
                    // because they reference another variant, not Template_Intelligent directly.
                    boolean isSubVariant = npcId.endsWith('_Wander') || npcId.endsWith('_Patrol')
                    boolean canAddNewParams = (isCombatCapable || needsTemplateConversion) && !isSubVariant && !isCaeExcluded
                    if (!canAddNewParams && !hasAnyCombatParam) {
                        skippedCount++
                        return
                    }
                    boolean modified = false
                    if (json.Modify instanceof Map) {
                        conditionalParams.each { key, val ->
                            if (json.Modify.containsKey(key)) {
                                if (key == '_CombatConfig' && json.Modify[key] instanceof Map) {
                                    return
                                }
                                json.Modify[key] = val
                                modified = true
                            }
                        }
                        // Convert Abstract template NPCs (Trork/Outlander/Goblin) to Template_Intelligent
                        // so they can use the CAE branch. Their faction-specific attack chains are replaced
                        // by our generic Root_RPGMobs_Attack_Melee (Default animations adapt to any weapon).
                        if (needsTemplateConversion && canAddNewParams) {
                            json.Reference = 'Template_Intelligent'
                            def templateJson = allRoleJsons[ref]
                            def templateParams = templateJson?.Parameters ?: [:]
                            if (!json.Modify.containsKey('Attack')) {
                                json.Modify['Attack'] = 'Root_RPGMobs_Attack_Melee'
                            }
                            if (!json.Modify.containsKey('AttackDistance')) {
                                def templateAttackDist = templateParams?.AttackDistance?.Value
                                json.Modify['AttackDistance'] = templateAttackDist ?: 3
                            }
                            def paramsToCopy = ['ViewRange', 'ViewSector', 'HearingRange', 'AlertedRange',
                                                'LeashDistance', 'LeashMinPlayerDistance', 'HardLeashDistance',
                                                'MaxSpeed', 'LeashTimer']
                            paramsToCopy.each { paramName ->
                                if (!json.Modify.containsKey(paramName) && templateParams?.containsKey(paramName)) {
                                    def val = templateParams[paramName]?.Value
                                    if (val != null) json.Modify[paramName] = val
                                }
                            }
                            // Strip Parameters that don't exist in Template_Intelligent.
                            // Template_Intelligent only supports: WanderRadius, FollowPatrolPath,
                            // Patrol, FlockArray, ApplySeparation, NameTranslationKey, ChaseRelativeSpeed
                            def validTemplateIntelligentParams = [
                                'WanderRadius', 'FollowPatrolPath', 'Patrol', 'FlockArray',
                                'ApplySeparation', 'NameTranslationKey', 'ChaseRelativeSpeed'
                            ] as Set
                            if (json.Parameters instanceof Map) {
                                def invalidParams = json.Parameters.keySet().findAll { !validTemplateIntelligentParams.contains(it) }
                                invalidParams.each { json.Parameters.remove(it) }
                            }
                            // Strip Modify fields that are specific to Abstract templates and
                            // don't exist in Template_Intelligent. These cause "Parameter does not
                            // exist or is private" errors when the Reference is changed.
                            // Strip ALL Modify fields that don't exist in Template_Intelligent.
                            // Instead of a deny-list (which keeps missing fields), use an ALLOW-list
                            // of fields that Template_Intelligent supports. Everything else gets removed.
                            def allowedTemplateIntelligentModifyFields = [
                                // Identity
                                'Appearance', 'DropList', 'Weapons', 'OffHand', 'NameTranslationKey',
                                // Stats
                                'MaxHealth', 'MaxSpeed', 'RunThreshold',
                                // Perception
                                'ViewRange', 'ViewSector', 'HearingRange', 'AlertedRange', 'AlertedTime',
                                // Combat
                                'Attack', 'AttackDistance', 'DefaultOffHandSlot',
                                // Leash
                                'LeashDistance', 'HardLeashDistance', 'LeashMinPlayerDistance', 'LeashTimer',
                                // Faction
                                'CombatMessageTargetGroups', 'IsMemory', 'MemoriesCategory', 'MemoriesNameOverride',
                                // Scheduling
                                'WakingPeriod', 'BreathesInWater',
                                // Template params (Compute references)
                                'FlockArray', 'FollowPatrolPath', 'Patrol', 'WanderRadius', 'ApplySeparation',
                                'ChaseRelativeSpeed',
                                // CAE
                                'UseCombatActionEvaluator', '_CombatConfig',
                                // Interaction vars (damage override)
                                '_InteractionVars'
                            ] as Set
                            def keysToRemove = json.Modify.keySet().findAll { !allowedTemplateIntelligentModifyFields.contains(it) }
                            keysToRemove.each { json.Modify.remove(it) }
                            modified = true
                        }
                        if (canAddNewParams) {
                            if (!json.Modify.containsKey('UseCombatActionEvaluator')) {
                                def resolvedAttack = resolveAttackField(npcId)
                                boolean isRanged = isRangedAttack(resolvedAttack)
                                def faction = detectFaction(npcId)
                                def caeConfigName = isRanged
                                    ? "CAE_RPGMobs_${resolvedAttack}"
                                    : "CAE_RPGMobs_Melee_${faction}"
                                json.Modify['UseCombatActionEvaluator'] = true
                                json.Modify['_CombatConfig'] = caeConfigName
                                def combatParamsToRemove = [
                                    'AttackPauseRange',
                                    'CombatAttackPreDelay', 'CombatRelativeTurnSpeed',
                                    'CombatBehaviorDistance', 'CombatDirectWeight',
                                    'CombatAlwaysMovingWeight', 'CombatStrafeWeight',
                                    'CombatBackwardsRelativeSpeed', 'CombatBackOffAfterAttack',
                                    'CombatBackOffDistanceRange',
                                    'BlockProbability'
                                ]
                                combatParamsToRemove.each { param ->
                                    json.Modify.remove(param)
                                }
                                if (isRanged) {
                                    rangedAttackToNpcIds[resolvedAttack] << npcId
                                } else {
                                    meleeFactionNpcIds[faction] << npcId
                                }
                                modified = true
                            } else {
                                preservedVanillaCaeCount++
                            }
                        }
                    }
                    if (!modified) {
                        skippedCount++
                        return
                    }
                    def outFile = new File(generatedResDir, 'Server/NPC/Roles/' + npcRolePaths[npcId])
                    outFile.parentFile.mkdirs()
                    outFile.text = new groovy.json.JsonBuilder(json).toPrettyString()
                    roleOverrideCount++
                } catch (Exception e) {
                    println "Warning: Failed to process role ${npcId}: ${e.message}"
                }
            }
        }

        // Phase 4A: Generate per-faction melee CAE configs with distinct combat styles
        def caeConfigCount = 0
        def meleeCount = 0
        def rangedCount = 0

        def factionCaeParams = [
            Skeleton: [
                description: 'Disciplined soldier',
                cooldownRange: [1.0, 2.0],
                shieldChargeFor: 1.5, shieldSwitchPoint: 0.5,
