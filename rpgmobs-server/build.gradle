                    Timeout: 2, CooldownRange: weaponCooldownRange]

                def strafeBasicAttacks = [Attacks: ["Root_RPGMobs_Attack_${weapon}"], Randomise: true,
                    UseProjectedDistance: true, MaxRange: weaponMaxRange + 0.5,
                    Timeout: 2, CooldownRange: weaponStrafeCooldownRange]

                def defaultActionsList = ['SelectTarget']
                if (tp.hasShield) {
                    defaultActionsList.add('ShieldBlock')
                }
                if (tp.hasBackOff) defaultActionsList.add('BackOff')
                if (tp.hasRetreat) defaultActionsList.add('HealthRetreat')
                if (tp.hasGroupObserve) defaultActionsList.add('GroupObserve')
                if (tp.hasFlanking) defaultActionsList.add('FlankPosition')

                def strafeActionsList = ['SelectTarget']
                if (tp.hasBackOff || tp.hasRetreat) strafeActionsList.add('ReEngageFromStrafe')
                if (tp.hasRetreat) strafeActionsList.add('HealthRetreat')
                if (tp.hasFlanking) strafeActionsList.add('FlankPosition')

                def caeActionSets = [:]
                caeActionSets.Default = [BasicAttacks: defaultBasicAttacks, Actions: defaultActionsList]
                caeActionSets.Strafe = [BasicAttacks: strafeBasicAttacks, Actions: strafeActionsList]

                def caeJson = [Type: 'CombatActionEvaluator', TargetMemoryDuration: 10,
                    CombatActionEvaluator: [
                        RunConditions: [
                            [Type: 'TimeSinceLastUsed', Curve: [ResponseCurve: 'Linear', XRange: [0, 3]]],
                            [Type: 'Randomiser', MinValue: 0.8, MaxValue: 1.0]
                        ],
                        MinRunUtility: 0.5, MinActionUtility: 0.01,
                        AvailableActions: caeActions, ActionSets: caeActionSets
                    ]]

                def caeFileName = "CAE_RPGMobs_T${tier}_${weapon}.json"
                def caeOutFile = new File(generatedResDir, "Server/NPC/Balancing/RPGMobs/" + caeFileName)
                caeOutFile.parentFile.mkdirs()
                caeOutFile.text = new groovy.json.JsonBuilder(caeJson).toPrettyString()
                caeConfigCount++
                perTierCaeCount++
            }
        }
        println "Generated ${perTierCaeCount} per-tier-per-weapon CAE configs (5 tiers x ${weaponNames.size()} weapons)"

        // Phase 4A-3: Generate per-faction-per-weapon role variants (32 total)
        // These are tiny Variant roles that setRoleName() switches to at runtime
        def roleVariantCount = 0
        def genRpgMobsRolesDir = new File(generatedResDir, 'Server/NPC/Roles/RPGMobs')
        genRpgMobsRolesDir.mkdirs()

        def factionNames = ['Skeleton', 'Trork', 'Outlander', 'Goblin']
        factionNames.each { faction ->
            weaponNames.each { weapon ->
                def variantJson = [
                    Type: 'Variant',
                    Reference: 'Template_Intelligent',
                    Modify: [
                        UseCombatActionEvaluator: true,
                        _CombatConfig: "CAE_RPGMobs_Melee_${faction}_${weapon}"
                    ]
                ]
                def variantFile = new File(genRpgMobsRolesDir, "RPGMobs_Elite_${faction}_${weapon}.json")
                variantFile.text = new groovy.json.JsonBuilder(variantJson).toPrettyString()
                roleVariantCount++
            }
        }
        println "Generated ${roleVariantCount} per-faction-per-weapon role variants"

        // Phase 4A-4: Generate per-tier-per-weapon test variants (40 total: 5 tiers x 8 weapons)
        // Each is a Variant of Template_Intelligent with Skeleton_Fighter appearance,
        // a specific weapon, tier-appropriate health, and per-tier CAE config.
        // Spawn manually via /npc spawn RPGMobs_Test_T{1-5}_{Weapon} to test tier-specific CAE.
        def testWeapons = [
            Swords:     'Weapon_Sword_Iron',
            Longswords: 'Weapon_Longsword_Iron',
            Daggers:    'Weapon_Daggers_Iron',
            Axes:       'Weapon_Axe_Iron',
            Battleaxes: 'Weapon_Battleaxe_Iron',
            Maces:      'Weapon_Mace_Iron',
            Clubs:      'Weapon_Club_Iron',
            ClubsFlail: 'Weapon_Club_Steel_Flail_Rusty',
            Spears:     'Weapon_Spear_Iron'
        ]
        def tierHealthValues = [1: 50, 2: 80, 3: 120, 4: 180, 5: 250]
        def testVariantCount = 0
        (1..5).each { int tier ->
            testWeapons.each { weaponCat, weaponItemId ->
                def attackRoot = "Root_RPGMobs_Attack_${weaponCat}"
                def attackDist = weaponHitboxParams[weaponCat]?.endDistance ?: 2.5
                def tierHealth = tierHealthValues[tier]
                def combatSpeed = weaponHitboxParams[weaponCat]?.combatSpeed ?: 7
                def testVariantJson = [
                    Type: 'Variant',
                    Reference: 'Template_Intelligent',
                    Modify: [
                        Appearance: 'Skeleton_Fighter',
                        MaxHealth: tierHealth,
                        MaxSpeed: combatSpeed,
                        ViewRange: 30,
                        ViewSector: 270,
                        HearingRange: 10,
                        AlertedRange: 30,
                        LeashDistance: 40,
                        Attack: attackRoot,
                        AttackDistance: attackDist,
                        DesiredAttackDistanceRange: [attackDist - 0.5, attackDist],
                        Weapons: [weaponItemId],
                        OffHand: [],
                        DropList: 'Drop_Skeleton_Fighter',
                        UseCombatActionEvaluator: true,
                        _CombatConfig: "CAE_RPGMobs_T${tier}_${weaponCat}",
                        IsMemory: true,
                        MemoriesCategory: 'Undead',
                        BreathesInWater: true,
                        WakingPeriod: [0, 24]
                    ]
                ]
                // Shield variant
                def testVariantFile = new File(genRpgMobsRolesDir, "RPGMobs_Test_T${tier}_${weaponCat}.json")
                testVariantFile.text = new groovy.json.JsonBuilder(testVariantJson).toPrettyString()
                testVariantCount++

                // Two-handed weapons: no shield variant only (no shield version of the above)
                // One-handed weapons: also generate a no-shield variant for testing
                def twoHandedWeapons = ['Longswords', 'Battleaxes', 'Spears'] as Set
                boolean isTwoHanded = twoHandedWeapons.contains(weaponCat)

                if (isTwoHanded) {
                    // Two-handed: remove shield from the main variant too
                    testVariantJson.Modify.remove('DefaultOffHandSlot')
                    testVariantJson.Modify.OffHand = []
                    testVariantJson.Modify.Appearance = 'Skeleton_Fighter'
                    testVariantFile.text = new groovy.json.JsonBuilder(testVariantJson).toPrettyString()
                } else {
                    // One-handed: also generate a no-shield variant
                    def noShieldJson = new groovy.json.JsonSlurper().parseText(new groovy.json.JsonBuilder(testVariantJson).toString())
                    noShieldJson.Modify.remove('DefaultOffHandSlot')
                    noShieldJson.Modify.OffHand = []
                    noShieldJson.Modify.Appearance = 'Skeleton_Fighter'
                    def noShieldFile = new File(genRpgMobsRolesDir, "RPGMobs_Test_T${tier}_${weaponCat}_NoShield.json")
                    noShieldFile.text = new groovy.json.JsonBuilder(noShieldJson).toPrettyString()
                    testVariantCount++
                }
            }
        }
        println "Generated ${testVariantCount} per-tier-per-weapon test variants (shield + no-shield per tier per weapon)"

        // Phase 4A-5: ParryTest NPC - minimal CAE with ONLY ShieldBlock (exact Praetorian copy)
        // ParryTest: ONLY ShieldBlock, nothing else. Pure parry testing.
        def parryTestCae = [
            Type: 'CombatActionEvaluator',
            TargetMemoryDuration: 10,
            CombatActionEvaluator: [
                RunConditions: [
                    [Type: 'TimeSinceLastUsed', Curve: [ResponseCurve: 'Linear', XRange: [0, 5]]],
                    [Type: 'Randomiser', MinValue: 0.75, MaxValue: 1]
                ],
                MinRunUtility: 0.5,
                MinActionUtility: 0.01,
                // No CAE guard actions - parry is purely code-side via setCurrentInteraction
                AvailableActions: [
                    SelectTarget: [Type: 'SelectBasicAttackTarget', Description: 'Select target',
                        Conditions: [[Type: 'Randomiser', MinValue: 0.9, MaxValue: 1.0]]]
                ],
                ActionSets: [
                    Default: [
                        BasicAttacks: [Attacks: ['Root_RPGMobs_Attack_Swords'], Randomise: true,
                            UseProjectedDistance: true, MaxRange: 3, Timeout: 2, CooldownRange: [2.0, 3.0]],
                        Actions: ['SelectTarget']
                    ]
                ]
            ]
        ]
        new File(generatedResDir, 'Server/NPC/Balancing/RPGMobs/CAE_RPGMobs_ParryTest.json').text = new groovy.json.JsonBuilder(parryTestCae).toPrettyString()

        def parryTestRole = [
            Type: 'Variant',
            Reference: 'Template_Intelligent',
            Modify: [
                Appearance: 'Skeleton_Knight',
                MaxHealth: 500,
                MaxSpeed: 6,
                ViewRange: 30,
                ViewSector: 270,
                HearingRange: 10,
                AlertedRange: 30,
                LeashDistance: 40,
                DefaultOffHandSlot: 0,
                Weapons: ['Weapon_Sword_Iron'],
                OffHand: ['Weapon_Shield_Rusty'],
                UseCombatActionEvaluator: true,
                _CombatConfig: 'CAE_RPGMobs_ParryTest',
                IsMemory: true,
                MemoriesCategory: 'Undead',
                BreathesInWater: true,
                WakingPeriod: [0, 24]
            ]
        ]
        new File(genRpgMobsRolesDir, 'RPGMobs_ParryTest.json').text = new groovy.json.JsonBuilder(parryTestRole).toPrettyString()

        // ParryTest_NoShield: same but weapon-only (no shield, tests weapon parry sound)
        def parryTestNoShieldRole = [
            Type: 'Variant',
            Reference: 'Template_Intelligent',
            Modify: [
                Appearance: 'Skeleton_Fighter',
                MaxHealth: 500,
                MaxSpeed: 6,
                ViewRange: 30,
                ViewSector: 270,
                HearingRange: 10,
                AlertedRange: 30,
                LeashDistance: 40,
                Weapons: ['Weapon_Sword_Iron'],
                OffHand: [],
                UseCombatActionEvaluator: true,
                _CombatConfig: 'CAE_RPGMobs_ParryTest',
                IsMemory: true,
                MemoriesCategory: 'Undead',
                BreathesInWater: true,
                WakingPeriod: [0, 24]
            ]
        ]
        new File(genRpgMobsRolesDir, 'RPGMobs_ParryTest_NoShield.json').text = new groovy.json.JsonBuilder(parryTestNoShieldRole).toPrettyString()
        println "Generated ParryTest NPCs (shield + no shield variants)"

        // Phase 4B: Generate per-attack-root CAE configs for ranged NPCs
        rangedAttackToNpcIds.each { attackId, npcList ->
            def caeActions = [:]
            caeActions.SelectTarget = [Type: 'SelectBasicAttackTarget', Description: 'Select attack target',
                Conditions: [[Type: 'Randomiser', MinValue: 0.9, MaxValue: 1.0]]]

            caeActions.BackOff = [Type: 'State', Description: 'Back off after sustained damage',
                State: 'Combat', SubState: 'Strafe',
                PostExecuteDistanceRange: [10, 14],
                Target: 'Hostile', WeightCoefficient: 1.5,
                Conditions: [
                    [Type: 'RecentSustainedDamage', Curve: [ResponseCurve: 'InverseExponential', XRange: [0, 2]]],
                    [Type: 'Randomiser', MinValue: 0.5, MaxValue: 1.0],
                    [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: 6]]
                ]]

            caeActions.HealthRetreat = [Type: 'State', Description: 'Retreat when health is low',
                State: 'Combat', SubState: 'Strafe',
                PostExecuteDistanceRange: [14, 20],
                Target: 'Hostile', WeightCoefficient: 5.0,
                Conditions: [
                    [Type: 'OwnStatPercent', Stat: 'Health', Curve: 'ReverseLinear'],
                    [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: 12]]
                ]]

            caeActions.ReEngageFromStrafe = [Type: 'State', Description: 'Return to combat from strafe',
                State: 'Combat', SubState: 'Default',
                PostExecuteDistanceRange: [8, 12],
                Target: 'Hostile',
                Conditions: [
                    [Type: 'TimeSinceLastUsed', Curve: [ResponseCurve: 'Linear', XRange: [0, 10]]],
                    [Type: 'Randomiser', MinValue: 0.5, MaxValue: 0.8]
                ]]

            def rangedBasicAttacks = [Attacks: [attackId], Randomise: true,
                UseProjectedDistance: true, MaxRange: 20,
                Timeout: 2, CooldownRange: [0.8, 1.5]]

            def rangedStrafeBasicAttacks = [Attacks: [attackId], Randomise: true,
                UseProjectedDistance: true, MaxRange: 20,
                Timeout: 2, CooldownRange: [1.0, 2.0]]

            def caeActionSets = [:]
            caeActionSets.Default = [
                BasicAttacks: rangedBasicAttacks,
                Actions: ['SelectTarget', 'BackOff', 'HealthRetreat']
            ]
            caeActionSets.Strafe = [
                BasicAttacks: rangedStrafeBasicAttacks,
                Actions: ['SelectTarget', 'ReEngageFromStrafe', 'HealthRetreat']
            ]

            def caeJson = [Type: 'CombatActionEvaluator', TargetMemoryDuration: 10,
                CombatActionEvaluator: [
                    RunConditions: [
                        [Type: 'TimeSinceLastUsed', Curve: [ResponseCurve: 'Linear', XRange: [0, 3]]],
                        [Type: 'Randomiser', MinValue: 0.8, MaxValue: 1.0]
                    ],
                    MinRunUtility: 0.5, MinActionUtility: 0.01,
                    AvailableActions: caeActions, ActionSets: caeActionSets
                ]]

            def caeFileName = "CAE_RPGMobs_${attackId}.json"
            def caeOutFile = new File(generatedResDir, "Server/NPC/Balancing/RPGMobs/" + caeFileName)
            caeOutFile.parentFile.mkdirs()
            caeOutFile.text = new groovy.json.JsonBuilder(caeJson).toPrettyString()
            caeConfigCount++
            rangedCount++
        }

        // Phase 5: Patch Template_Intelligent with Flee instruction for setBackingAway support
        def templateIntelligentFile = new File(npcRolesDir, '_Core/Templates/Template_Intelligent.json')
        if (templateIntelligentFile.exists()) {
            def templateJson = new groovy.json.JsonSlurper().parse(templateIntelligentFile)

            // Add flee parameters
            if (templateJson.Parameters instanceof Map) {
                templateJson.Parameters['RPGMobsFleeStopDistance'] = [Value: 12, Description: 'RPGMobs - stop fleeing when target is this far away']
                templateJson.Parameters['RPGMobsFleeSlowDownDistance'] = [Value: 8, Description: 'RPGMobs - start slowing down during flee at this distance']
            }

            // Find the Combat state and inject Flee instruction before the attack instruction
            def states = templateJson?.Content?.States
            if (states instanceof Map) {
                def combatState = states['Combat']
                if (combatState?.Content?.Instructions instanceof List) {
                    def instructions = combatState.Content.Instructions
                    def fleeInstruction = [
                        '$Comment': 'RPGMobs - Flee when setBackingAway is true',
                        Continue: true,
                        Sensor: [
                            Type: 'And',
                            Sensors: [
                                [Type: 'IsBackingAway'],
                                [Type: 'Target', Range: 100]
                            ]
                        ],
                        BodyMotion: [
                            Type: 'Flee',
                            StopDistance: [Compute: 'RPGMobsFleeStopDistance'],
                            SlowDownDistance: [Compute: 'RPGMobsFleeSlowDownDistance']
                        ],
                        HeadMotion: [Type: 'Watch']
                    ]
                    // Insert at beginning of instructions so flee takes priority
                    instructions.add(0, fleeInstruction)
                }
            }

            def templateOutFile = new File(generatedResDir, 'Server/NPC/Roles/_Core/Templates/Template_Intelligent.json')
            templateOutFile.parentFile.mkdirs()
            templateOutFile.text = new groovy.json.JsonBuilder(templateJson).toPrettyString()
            println "Patched Template_Intelligent with RPGMobs Flee instruction"
        }

        // NOTE: Chase component is NOT patched. The Flee instruction in Template_Intelligent
        // fires at the Combat state level (above Chase) when IsBackingAway is true.
        // Chase naturally exits when the NPC's target changes or navigation updates.

        println "Generated ${roleOverrideCount} role overrides (${skippedCount} skipped non-intelligent)"
        println "Generated ${caeConfigCount} CAE configs (${meleeCount} melee factions + ${perWeaponCaeCount} per-faction-per-weapon + ${perTierCaeCount} per-tier-per-weapon, ${rangedCount} ranged)"
        println "Generated ${roleVariantCount} per-faction-per-weapon role variants"
        println "Generated ${testVariantCount} per-tier-per-weapon test variants"
        println "Preserved ${preservedVanillaCaeCount} vanilla CAE configs (not overridden)"
        meleeFactionNpcIds.each { faction, npcList ->
            println "  Faction ${faction}: ${npcList.size()} melee NPCs"
        }

        outputFile.text = """\
package com.frotty27.rpgmobs.generated;

import java.util.List;

public final class HytaleAssetIds {
    private HytaleAssetIds() {}

    public static final List<String> ALL_NPC_IDS = List.of(
${npcLiterals}
    );

    public static final List<String> ALL_ITEM_ICON_IDS = List.of(
${itemLiterals}
    );

}
"""
        println "Generated HytaleAssetIds: ${npcIdsSorted.size()} NPCs, ${itemIds.size()} item icons, ${roleOverrideCount} role overrides, ${caeConfigCount} CAE configs, ${roleVariantCount} role variants"
    }
}

tasks.compileJava.dependsOn tasks.generateAssetIds

dependencies {
    implementation project(':rpgmobs-api')
    implementation 'org.yaml:snakeyaml:2.2'
    compileOnly 'org.jspecify:jspecify:0.3.0'
    compileOnly files(rootProject.ext.hytaleJar)
    compileOnly files(rootProject.ext.nameplateBuilderApiJar)
    compileOnly files(rootProject.ext.rpgLevelingJar)

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation files(rootProject.ext.hytaleJar)
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.2'
}

tasks.processResources {
    def expandProps = [
            'name'          : 'RPG Mobs',
            'version'       : version as String,
            'group'         : rootProject.group as String,
            'description'   : rootProject.findProperty('description') ?: '',
            'website'       : rootProject.findProperty('website') ?: '',
            'server_version': rootProject.findProperty('server_version') ?: '',
            'entry_point'   : rootProject.findProperty('entry_point') ?: '',
    ]

    filesMatching('manifest.json') {
        expand(expandProps)
    }
    inputs.properties(expandProps)
}

tasks.shadowJar {
    archiveClassifier = ''
    relocate 'org.yaml.snakeyaml', 'com.frotty27.rpgmobs.shaded.snakeyaml'
    // Explicitly include rpgmobs-api classes  -  shadow may skip them due to
    // split-package overlap (server has implementation classes in the api namespace).
    from project(':rpgmobs-api').sourceSets.main.output
}

tasks.test {
    useJUnitPlatform()
    systemProperty 'java.util.logging.manager', 'com.hypixel.hytale.logger.backend.HytaleLogManager'
    testLogging {
        events = ['passed', 'skipped', 'failed']
        exceptionFormat = 'short'
        showExceptions = true
        showCauses = true
        showStackTraces = true
    }
}

tasks.register('deploy') {
    group = 'hytale'
    description = 'Builds the shadow jar and copies it to the Hytale UserData Mods folder'
    dependsOn tasks.shadowJar

    doLast {
        rootProject.ext.userModsDir.mkdirs()
        def jarFile = tasks.shadowJar.archiveFile.get().asFile

        copy {
            from jarFile
            into rootProject.ext.userModsDir
        }

        println "Deployed ${jarFile.name} to ${rootProject.ext.userModsDir}"
    }
}

tasks.build {
    dependsOn tasks.shadowJar
    finalizedBy tasks.deploy
}
