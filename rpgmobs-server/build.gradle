            5: [cooldownRange: [0.4, 1.0], strafeCooldownRange: [1.0, 2.0],
                hasShield: true, hasRetreat: true, hasBackOff: true, hasGroupObserve: true, hasFlanking: true,
                shieldChargeFor: 5.0, shieldSwitchPoint: 4.0,
