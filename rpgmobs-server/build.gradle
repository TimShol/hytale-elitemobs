                Conditions: [
                    [Type: 'Randomiser', MinValue: 0.7, MaxValue: 1.0],
                    [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: params.shieldSwitchPoint]],
