            // Weapon EndDistances: Daggers 1.8, Swords/Axes/Clubs 2.5, Maces 2.8, Longswords 3.0, Battleaxes 3.2, Spears 3.5.
            // setCurrentBasicAttack() swaps the root at runtime but MaxRange stays fixed.
