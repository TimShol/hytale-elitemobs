                            [Type: 'Randomiser', MinValue: 0.6, MaxValue: 1.0],
                            [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: 8]]
                        ]]
                }

                if (tp.hasFlanking) {
                    caeActions.FlankPosition = [Type: 'Ability', Description: 'Flank behind target before attacking',
                        Target: 'Hostile',
                        Positioning: 'Flank',
                        PositionFirst: true,
                        WeaponSlot: 0,
                        Ability: "Root_RPGMobs_Attack_${weapon}",
