                        ]]
                }

                if (faction == 'Outlander') {
                    caeActions.FlankPosition = [Type: 'Ability', Description: 'Flank behind target before attacking',
                        Target: 'Hostile',
                        Positioning: 'Flank',
                        PositionFirst: true,
                        WeaponSlot: 0,
                        Ability: "Root_RPGMobs_Attack_${weapon}",
                        SubState: 'Default',
                        AttackDistanceRange: [1.5, 3.0],
                        PostExecuteDistanceRange: [2, 4],
                        WeightCoefficient: 1.3,
                        Conditions: [
                            [Type: 'Randomiser', MinValue: 0.5, MaxValue: 1.0],
                            [Type: 'TimeSinceLastUsed', Curve: [Type: 'Switch', SwitchPoint: 15]]
                        ]]
                }

                caeActions.ReEngageFromStrafe = [Type: 'State', Description: 'Return to combat from strafe',
                    State: 'Combat', SubState: 'Default',
                    PostExecuteDistanceRange: [2, 3],
                    Target: 'Hostile',
                    Conditions: [
                        [Type: 'TimeSinceLastUsed', Curve: [ResponseCurve: 'Linear', XRange: params.reEngageXRange]],
                        [Type: 'Randomiser', MinValue: params.reEngageRandomiser[0], MaxValue: params.reEngageRandomiser[1]]
                    ]]

